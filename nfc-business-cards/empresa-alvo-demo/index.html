<!DOCTYPE html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Colaborador Demo | Cornelder de Moçambique - NFC Business Card</title>
    <meta
      name="description"
      content="Perfil digital demonstrativo Cornelder de Moçambique. Cartão inteligente NFC com links do Porto da Beira, contactos institucionais e QR Code. Solução HioTech."
    />
    <meta name="keywords" content="Cornelder, Porto da Beira, NFC business card, cartão digital, logística, Moçambique, HioTech">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://hiotech.co/nfc-business-cards/empresa-alvo-demo/">
    <link rel="icon" type="image/png" href="../../img/hiotech.jpg">
    <meta property="og:type" content="profile">
    <meta property="og:title" content="Cornelder de Moçambique | NFC Business Card Demo">
    <meta property="og:description" content="Demonstração de cartão inteligente corporativo para Cornelder de Moçambique - NFC, QR Code e perfil digital.">
    <meta property="og:url" content="https://hiotech.co/nfc-business-cards/empresa-alvo-demo/">
    <meta property="og:image" content="https://hiotech.co/img/hiotech.jpg">
    <meta name="twitter:card" content="summary">
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Person",
      "name": "Colaborador Demo",
      "jobTitle": "Gestor Comercial",
      "worksFor": {
        "@type": "Organization",
        "name": "Cornelder de Moçambique",
        "url": "https://www.cornelder.co.mz/"
      },
      "url": "https://hiotech.co/nfc-business-cards/empresa-alvo-demo/"
    }
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: { sans: ["Inter", "sans-serif"] },
            colors: {
              brand: {
                dark: "#0B0F19",
                accent: "#0EA5E9",
                blue: "#2563EB",
              },
            },
          },
        },
      };
    </script>
  </head>
  <body class="bg-slate-950 text-slate-100 font-sans antialiased min-h-screen">
    <div
      id="toast"
      class="fixed bottom-5 right-5 z-50 transform translate-y-20 opacity-0 transition-all duration-300 ease-out pointer-events-none"
    >
      <div
        class="bg-slate-900 border border-emerald-500/30 text-emerald-400 px-5 py-3 rounded-xl flex items-center gap-3 shadow-2xl backdrop-blur-md"
      >
        <div class="bg-emerald-500/20 p-2 rounded-lg">
          <i class="fa-solid fa-circle-check"></i>
        </div>
        <div>
          <p class="font-semibold text-sm">Contacto exportado</p>
          <p class="text-xs text-slate-400">vCard guardado com URL do perfil.</p>
        </div>
      </div>
    </div>

    <main class="min-h-screen flex justify-center items-center py-4 px-4">
      <div
        class="w-full max-w-md bg-slate-900/60 border border-slate-800 rounded-3xl overflow-hidden shadow-2xl relative"
      >
        <div
          id="profile-standalone-bg"
          class="h-32 w-full bg-gradient-to-br from-amber-600 to-orange-700 relative"
        >
          <div class="absolute top-4 left-6">
            <span
              id="profile-standalone-badge"
              class="text-[10px] uppercase font-black tracking-widest text-white"
              >Cornelder de Moçambique</span
            >
          </div>
          <div class="absolute top-4 right-6">
            <span
              class="px-2 py-0.5 rounded-full bg-black/40 text-[9px] font-bold text-slate-300"
              >Demo Piloto</span
            >
          </div>
        </div>

        <div
          class="flex flex-col items-center -mt-16 px-6 pb-8 text-center relative z-10"
        >
          <div
            class="w-28 h-28 rounded-full border-4 border-slate-950 overflow-hidden shadow-2xl bg-slate-800 flex items-center justify-center"
          >
            <svg
              viewBox="0 0 100 100"
              id="profile-standalone-avatar-svg"
              class="w-full h-full fill-current text-amber-400"
            >
              <circle cx="50" cy="35" r="20" />
              <path d="M50 60c-25 0-35 15-35 25h70c0-10-10-25-35-25z" />
            </svg>
          </div>

          <h1
            id="profile-standalone-name"
            class="text-2xl font-bold mt-4 text-white"
          >
            Colaborador Demo
          </h1>
          <p
            id="profile-standalone-role"
            class="text-sm font-semibold mt-1 text-amber-400"
          >
            Gestor Comercial
          </p>
          <div class="flex items-center gap-1.5 text-xs text-slate-400 mt-1">
            <i class="fa-solid fa-location-dot"></i>
            <span id="profile-standalone-location">Porto da Beira</span>
          </div>

          <p
            id="profile-standalone-bio"
            class="text-slate-300 text-sm italic mt-4 max-w-sm"
          ></p>

          <p
            id="profile-return-hint"
            class="text-xs text-slate-400 mt-4 p-3 rounded-xl bg-slate-950/80 border border-slate-800 text-left"
          ></p>

          <div class="flex gap-5 my-6">
            <a
              id="profile-standalone-action-phone"
              href="#"
              class="w-12 h-12 rounded-full bg-slate-950 hover:bg-slate-800 flex items-center justify-center border border-slate-800 text-lg transition text-amber-400"
              ><i class="fa-solid fa-phone"></i
            ></a>
            <a
              id="profile-standalone-action-email"
              href="#"
              class="w-12 h-12 rounded-full bg-slate-950 hover:bg-slate-800 flex items-center justify-center border border-slate-800 text-lg transition text-amber-400"
              ><i class="fa-solid fa-envelope"></i
            ></a>
            <a
              id="profile-standalone-action-whatsapp"
              href="#"
              class="w-12 h-12 rounded-full bg-slate-950 hover:bg-slate-800 flex items-center justify-center border border-slate-800 text-lg transition text-amber-400"
              ><i class="fa-brands fa-whatsapp"></i
            ></a>
          </div>

          <div
            class="w-full space-y-3.5 text-left"
            id="profile-standalone-links"
          ></div>

          <div
            class="mt-6 border-t border-slate-800/80 pt-6 w-full flex flex-col items-center"
          >
            <p
              class="text-[10px] text-slate-500 uppercase tracking-widest font-semibold mb-2"
            >
              Partilhar este perfil
            </p>
            <div
              id="profile-qr"
              class="bg-white p-2 rounded-xl shadow-lg inline-flex items-center justify-center"
            ></div>
            <p class="text-[9px] text-slate-600 mt-2">
              URL fixa para gravação NFC - Cartão 2 do piloto
            </p>
          </div>

          <div
            class="mt-8 pt-6 border-t border-slate-800/80 w-full flex flex-col items-center gap-2"
          >
            <a
              href="../index.html"
              class="flex items-center gap-2 group opacity-60 hover:opacity-100 transition"
            >
              <img src="../../img/hiotech_logo.png" alt="HioTech" class="h-6 w-auto">
              <span class="text-xs font-bold text-slate-300"
                >Powered by HioTech</span
              >
            </a>
          </div>
        </div>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
    <script src="../assets/profiles.js"></script>
    <script src="../assets/profile.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () =>
        initProfilePage("cornelder")
      );
    </script>
  </body>
</html>
